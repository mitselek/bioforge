# Pre-commit hooks — enforced for every commit. Bypass via --no-verify
# is forbidden per docs/WORKFLOW.md §5.2.
#
# Fast static checks only. Test execution (`vitest run`) moved to
# Layer 3 (story acceptance gate) because strict TDD requires RED
# commits to contain failing tests by design. See WORKFLOW.md §5.2.
pre-commit:
  parallel: true
  commands:
    typecheck:
      run: npm run typecheck
    lint:
      run: npm run lint
    format-check:
      run: npm run format:check
